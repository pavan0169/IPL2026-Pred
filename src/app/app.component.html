<!-- Root App Component Template -->

<!-- ===== Initial Auth Loading ===== -->
@if (authLoading()) {
<div class="app-container" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
  <app-cricket-loader size="lg" message="🏏 Getting you to the crease..."></app-cricket-loader>
</div>
}

<!-- ===== LANDING / AUTH (not logged in) ===== -->
@if (!authLoading() && !authService.isLoggedIn()) {
<app-landing></app-landing>
}

<!-- ===== MAIN APP (logged in) ===== -->
@if (!authLoading() && authService.isLoggedIn()) {
<div class="app-container">
  <!-- Animated Background Orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <!-- Desktop Navigation -->
  <nav class="nav-bar" *ngIf="!isMobile()">
    <div class="nav-brand">
      <span class="brand-icon">🏏</span>
      <span class="brand-text">IPL 2026 Predict</span>
    </div>
    <div class="nav-tabs">
      <button *ngFor="let tab of visibleTabs" class="nav-button" [class.active]="activeTab() === tab.id"
        (click)="setTab(tab.id)">
        <span class="icon" [innerHTML]="tab.icon"></span>
        <span class="label">{{ tab.label }}</span>
        <span class="nav-glow" *ngIf="activeTab() === tab.id"></span>
      </button>
    </div>
    <div class="nav-right">
      <div class="user-chip">
        <span class="user-avatar">👤</span>
        <span class="user-name">{{ authService.currentUser()?.username }}</span>
      </div>
      <button class="theme-toggle" (click)="themeService.toggle()"
        [title]="themeService.isDark() ? 'Switch to light' : 'Switch to dark'">
        <span [innerHTML]="themeService.isDark() ? '🌙' : '☀️'"></span>
      </button>
      <button class="btn btn-ghost btn-sm logout-btn" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
          style="margin-right:0.3rem">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Logout
      </button>
    </div>
  </nav>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav" *ngIf="isMobile()">
    <button *ngFor="let tab of visibleTabs" class="nav-button" [class.active]="activeTab() === tab.id"
      (click)="setTab(tab.id)">
      <span class="icon" [innerHTML]="tab.icon"></span>
      <span class="nav-glow" *ngIf="activeTab() === tab.id"></span>
    </button>
    <button class="theme-toggle" (click)="themeService.toggle()">
      {{ themeService.isDark() ? '🌙' : '☀️' }}
    </button>
    <button class="nav-button logout-mobile" (click)="logout()">🚪</button>
  </nav>

  <!-- Mobile Header -->
  <header class="mobile-header" *ngIf="isMobile()">
    <div class="nav-brand">
      <span class="brand-icon">🏏</span>
      <span class="brand-text">IPL 2026 Predict</span>
    </div>
    <div class="user-chip">
      <span class="user-avatar">👤</span>
      <span class="user-name">{{ authService.currentUser()?.username }}</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="content">
    @if (tabSwitching()) {
    <app-cricket-loader size="sm"></app-cricket-loader>
    } @else {
    <app-predict *ngIf="activeTab() === 'predict'"></app-predict>
    <app-match-guide *ngIf="activeTab() === 'guide'"></app-match-guide>
    <app-standings *ngIf="activeTab() === 'standings'"></app-standings>
    <app-locked-predictions *ngIf="activeTab() === 'locked'"></app-locked-predictions>
    <app-past-predictions *ngIf="activeTab() === 'history'"></app-past-predictions>
    <app-admin *ngIf="activeTab() === 'admin' && authService.isAdmin()"></app-admin>
    <app-user-profile *ngIf="activeTab() === 'profile'"></app-user-profile>
    }
  </main>
</div>
}
